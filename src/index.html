<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Player</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double+Ink:wght@100..900&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Inconsolata:wght@200..900&family=Libertinus+Sans:ital,wght@0,400;0,700;1,400&family=Vollkorn:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="main">
      <div id="titulo">
        <h1 id="title"></h1>
        <div id="by">
          <p>By:</p>
          <p id="author"></p>
        </div>
      </div>

      <div id="foto">
        <img id="image" src="" alt="Capa da música" width="250" />
      </div>

      <div id="musica-player">
        <audio id="audio" src="" type="audio/mpeg"></audio>

        <div class="slider">
          <div class="time-controls">
            <span id="current-time">0:00</span>

            <input
              type="range"
              id="duration-slider"
              min="0"
              max="100"
              value="0"
            />

            <span id="total-duration">0:00</span>
          </div>
        </div>

        <div id="controls">
          <button id="prev">
            <img id="icones" src="Assets/playLeft.aseprite.png" alt="Rewind" />
          </button>
          <button id="stopStart">
            <img id="pause" alt="Play/Pause" />
          </button>
          <button id="restart">
            <img id="icones" src="Assets/replay.png" alt="Play/Pause" />
          </button>
          <button id="next">
            <img id="icones" src="Assets/play.aseprite.png" alt="Forward" />
          </button>
        </div>
      </div>
    </div>

    <script src="./code.js"></script>
  </body>
</html>
